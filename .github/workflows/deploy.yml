name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /var/www/vacation-room-assignments
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build
            DATABASE_URL=file:/var/www/vacation-room-assignments/prisma/prod.db npx prisma db push
            chown www-data:www-data prisma/prod.db prisma
            chmod 664 prisma/prod.db
            systemctl restart vacation-room-assignments
            echo "Deploy complete"
